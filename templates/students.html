<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Management</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">SMS</div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/students" class="active">Students</a>
        <a href="/attendance">Attendance</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Students</h1>
          <span class="section-tag">Manage student records</span>
          <p class="subtitle">Manage student profiles, search records, and update details in one place.</p>
        </div>
        <div class="topbar-right">
          <span class="welcome-text">Hello, {{ session.get('user_name', 'User') }}</span>
          <a href="/logout" class="btn secondary">Logout</a>
        </div>
      </header>

      <section class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="search" placeholder="Search by name, id, email..." />
          <button id="btn-search" class="btn secondary">Search</button>
          <button id="btn-refresh" class="btn secondary">Refresh</button>
        </div>
        <div>
          <button id="btn-open-form" class="btn accent">Add Student</button>
        </div>
      </section>

      <section class="content">
        <table class="table" id="students-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Student ID</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Department</th>
              <th>Year</th>
              <th>Type</th>
              <th>DOB</th>
              <th>Address</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="students-body">
            <tr><td colspan="11">Loading...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- Modal / Form -->
  <div class="modal" id="student-modal" aria-hidden="true">
    <div class="modal-content">
      <h3 id="modal-title">Add Student</h3>
      <form id="student-form">
        <input type="hidden" id="student-db-id" />
        <div class="form-row">
          <label>Student ID</label>
          <input type="text" id="student_id" required />
        </div>
        <div class="form-row">
          <label>Full Name</label>
          <input type="text" id="full_name" required />
        </div>
        <div class="form-row">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="text" id="phone" />
        </div>
        <div class="form-row">
          <label>Department</label>
          <select id="department_id" required></select>
        </div>
        <div class="form-row">
          <label>Year</label>
          <input type="number" id="year" min="1" max="10" required />
        </div>
        <div class="form-row">
          <label>Date of Birth</label>
          <input type="date" id="dob" required />
        </div>
        <div class="form-row">
          <label>Student Type</label>
          <select id="student_type" required>
            <option value="College">College</option>
            <option value="High School">High School</option>
            <option value="International">International</option>
            <option value="Vocational">Vocational</option>
          </select>
        </div>
        <div class="form-row">
          <label>Address</label>
          <textarea id="address"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" id="form-save">Save</button>
          <button type="button" id="form-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      attachStudentsPageHandlers();
      loadDepartments();
      loadStudents();
    });
  </script>
</body>
</html>
